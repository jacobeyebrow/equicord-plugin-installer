# Build EquicordManager.exe on GitHub (Windows runner). Download the artifact from the Actions tab.
name: Build Windows exe

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pyinstaller:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install -r requirements-manager-build.txt

      - name: PyInstaller (EquicordManager.spec)
        run: python -m PyInstaller --noconfirm --clean EquicordManager.spec

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: EquicordManager-Windows
          path: dist/EquicordManager.exe
