# Build EquicordManager.exe and attach it to a GitHub Release when you push a version tag (e.g. v1.0.0).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install -r requirements-manager-build.txt

      - name: PyInstaller (EquicordManager.spec)
        run: python -m PyInstaller --noconfirm --clean EquicordManager.spec

      - name: Create GitHub Release with exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EquicordManager.exe
          generate_release_notes: true
